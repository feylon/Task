services:
  # 1. Ma'lumotlar bazasi (Persistent storage bilan)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Frontend
  frontend:
    build: ./frontend
    ports:
      - "81:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3000

  # 4. Simulator
  simulator:
    build: ./simulator
    env_file:
      - ./simulator/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Ma'lumotlarni doimiy saqlash uchun jild
volumes:
  pgdata: